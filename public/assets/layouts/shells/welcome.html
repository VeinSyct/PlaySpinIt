<meta name="viewport" content="width = device-width, initial-scale = 1, minimum-scale = 1, maximum-scale = 1, user-scalable = 0, viewport-fit = cover, shrink-to-fit = no">
<link rel="stylesheet" href="assets/css/style.css" />
<style>
    *{
        transition: all 0.6s;
    }
    html {
        height: 100%;
    }
    body{
        font-family: 'Lato', sans-serif;
        color: white;
        margin: 0;
    }
    .welcome-cont {
        display: table;
        width: 100%;
        height: 100vh;
        text-align: center;
        animation: fadeIn 1000ms ease;
        -webkit-animation: fadeIn 1000ms ease;
	}
	@keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    @-webkit-keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    .welcom-text {
        display: table-cell;
        vertical-align: middle;
    }
    .welcom-text h1{
        font-size: 60px;
        display: inline-block;
        padding-right: 12px;
        animation: type .5s alternate infinite;
        pointer-events: none;
    }
    @keyframes type{
        from{box-shadow: inset -3px 0px 0px #888;}
        to{box-shadow: inset -3px 0px 0px transparent;}
    }
    h1 {
        background: conic-gradient(
        #CA4246 16.666%, 
        #E16541 16.666%, 
        #E16541 33.333%, 
        #F18F43 33.333%, 
        #F18F43 50%, 
        #8B9862 50%, 
        #8B9862 66.666%, 
        #476098 66.666%, 
        #476098 83.333%, 
        #A7489B 83.333% );
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color:transparent;
    }
    .testimonial-wrapper {
        max-width: 600px;
        margin: auto;
    }
    .testimonial blockquote {
        margin: 10px 10px 0;
        background: -webkit-linear-gradient(to left, #959fba, #757f9a);
        background: linear-gradient(to left, #959fba, #757f9a);
        padding: 20px 60px;
        position: relative;
        border: none;
        border-radius: 8px;
        font-style: italic;
    }
    .testimonial blockquote:before,
    .testimonial blockquote:after {
        content: "\201C";
        position: absolute;
        font-size: 80px;
        line-height: 1;
        color: white;
        font-style: normal;
    }
    .testimonial blockquote:before {
        top: 0;
        left: 10px;
    }
    .testimonial blockquote:after {
        content: "\201D";
        right: 10px;
        bottom: -0.5em;
    }
    .testimonial-author {
        width: 0;
        height: 0;
        border-left: 0 solid transparent;
        border-right: 20px solid transparent;
        border-top: 20px solid #757f9a;
        white-space: nowrap;
        margin: 0 0 0 96px;
    }
    .testimonial-author > span {
        margin-left: -49px;
        text-shadow: 0 0 1px currentColor, 0 0 2px dimgrey;
    }
</style>
<div class="welcome-cont"></div>
<script src="assets/js/index.js"></script>
<script>
    let _uz = { user: localStorage.user ? JSON.parse(localStorage.user) : { agreed: {}, opened: {} }, message: [
            `You’re a valued member! You can now request an <strong>eCash</strong> credits loan to fund your game.`,
            `As a member, you’re eligible to request an <strong>eCash</strong> credits loan to boost your game.`,
            `Being a member has its perks! Request an <strong>eCash</strong> credits loan to fund your next game.`,
            `Welcome, member! You may request an <strong>eCash</strong> credits loan to continue playing.`,
            `Great to see you, member! You can request an <strong>eCash</strong> credits loan to power up your game.`
        ][Math.floor(Math.random() * 5)] };
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelector(".welcome-cont").innerHTML = `
            <div class="welcom-text">
                <h1 class="welcome">Welcome${_uz.user.name ? ` ${_uz.user.name}` : ""}!</h1>
                <br>
                <br>
                <div class="testimonial-wrapper">
                    <div class="testimonial">
                        <blockquote>
                            ${_uz.message}
                        </blockquote>
                    <div>
                    <p class="testimonial-author">
                        <span><strong>Play Spin It!</strong> games</span>
                    </p>
                <div>
                <br>
                <br>
                <a onclick="loadPage({ shells: ['carousel', 'lobby', 'faqs'], scroll: 1 })" style="text-shadow: 0 0 1px currentColor, 0 0 2px dimgrey; cursor: pointer">← Back to lobby</a>
            </div>`;
    });
    document.addEventListener("DOMContentLoaded", ()=> {
        window.parent.postMessage({
            id: window.frameElement.id,
            action: "pre-loader",
            show: !1
        }, "*");
    });
</script>
