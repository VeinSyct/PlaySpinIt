<meta name="viewport" content="width = device-width, initial-scale = 1, minimum-scale = 1, maximum-scale = 1, user-scalable = 0, viewport-fit = cover, shrink-to-fit = no">
<link rel="stylesheet" href="assets/css/font-awesome.min.css" />
<link rel="stylesheet" href="assets/css/style.css" />
<link rel="stylesheet" href="assets/css/metallicgold.css" />
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        place-items: center;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        color: #ffffff;
    }
    .outer-black {
        margin: 0 auto;
        width: 300px;
        height: 300px;
        border-radius: 50%;
    }
    .outer-iron {
        width: 290px;
        height: 290px;
        background:
            radial-gradient(
                ellipse 150% 150% at 80% 80%,
                transparent 40%,
                rgba(255, 255, 255, .25) 60%,
                transparent 100%
            ),
            radial-gradient(ellipse 150% 150% at 20% 20%, transparent 40%, rgba(0, 0, 0, .25) 60%, transparent 100%),
            radial-gradient(ellipse 100% 100% at 50% 50%, transparent 25%, rgba(0, 0, 0, .5) 75%),
            linear-gradient(
                100deg,
                hsla(0, 50%, 25%, .25) 0%,
                hsla(5, 75%, 35%, .25) 15%,
                hsla(10, 75%, 40%, .25) 25%,
                hsla(15, 75%, 55%, .25) 35%,
                hsla(20, 65%, 45%, .25) 40%,
                hsla(10, 55%, 40%, .25) 50%,
                hsla(5, 55%, 35%, .25) 65%,
                hsla(5, 55%, 35%, .25) 70%,
                hsla(0, 65%, 30%, .25) 85%,
                hsla(0, 75%, 25%, .25) 100%
            ),
            linear-gradient(
                180deg,
                hsla(210, 15%, 20%, .5) 0,
                hsla(220, 25%, 10%, .5) 35%,
                hsla(235, 25%, 5%, .5) 65%,
                hsla(0, 0%, 0%, .5) 100%
            ),
            linear-gradient(
                180deg,
                hsl(200, 80%, 30%) 0%,
                hsl(195, 70%, 45%) 7%,
                hsl(180, 80%, 70%) 25%,
                hsl(180, 100%, 60%) 35%,
                hsl(190, 70%, 55%) 55%,
                hsl(195, 100%, 35%) 75%,
                hsl(200, 85%, 25%) 100%
            );
        background-blend-mode: multiply;
        margin-left: 5px;
        margin-top: 5px;
        border-radius: 50%;
        box-shadow: 1px 1px 4px #8a8787ad inset;
        overflow: hidden;
        position: relative;
        border: 4px solid #575757;
        border: .5px solid #fadc88;
        border-top: .031em solid #fadc88;
        border-left: .031em solid #5c3605;
        border-right: .031em solid #4c2605;
        border-bottom: .031em solid #3c1600;
        box-shadow: rgba(0, 0, 0, .07) 0px 1px 1px, rgba(0, 0, 0, .07) 0px 2px 2px, rgba(0, 0, 0, .07) 0px 4px 4px, rgba(0, 0, 0, .07) 0px 8px 8px, rgba(0, 0, 0, .07) 0px 16px 16px, inset 0 0 3px 0 rgba(69,2,2,0.67);
        filter: drop-shadow(5px 15px 15px black);
    }
    .inner-black {
        width: 260px;
        height: 260px;
        background-color: #1e1e1e;
        position: absolute;
        top: 15px;
        left: 15px;
        border-radius: 50%;
    }
    .inner-black-2 {
        width: 240px;
        height: 240px;
        border-radius: 50%;
        margin-left: 10px;
        margin-top: 10px;
        background-color: #101010;
        border: 1px solid #5e5e5eb3;
    }
    .inner-black-3 {
        width: 230px;
        height: 230px;
        margin-top: 5px;
        margin-left: 5px;
        background-color: #252525;
        border-radius: 50%;
        border: 1px solid #1c1c1c;
        box-sizing: border-box;
    }
    .glare {
        width: 220px;
        height: 250px;
        background-color: #fff;
        border-radius: 50%;
        margin-left: 35px;
        transform: translateY(-50px);
        box-shadow: 0 0 50px 37px #fff;
    }
    button.engine {
        -webkit-tap-highlight-color: transparent;
        background:
            linear-gradient(
                135deg,
                rgba(0, 0, 0, .25) 0,
                rgba(26, 26, 26, .25) 15%,
                rgba(77, 77, 77, .25) 25%,
                rgba(129, 54, 54, .25) 50%,
                rgba(26, 26, 26, .25) 75%,
                rgba(0, 0, 0, .25) 100%
            ),
            radial-gradient(circle farthest-corner at 50% 50%, transparent 45%, rgba(0, 0, 0, .5) 100%),
            linear-gradient(
                90deg,
                hsla(230, 35%, 15%, .5) 0%,
                hsla(245, 30%, 40%, .5) 15%,
                hsla(230, 55%, 45%, .5) 40%,
                hsla(225, 20%, 30%, .5) 60%,
                hsla(235, 25%, 25%, .5) 80%,
                hsla(225, 50%, 16%, .5) 100%
            ),
            linear-gradient(45deg, Black 0, #333333 20%, #666666 40%, #4d4d4d 70%, #000000 100%);
        border-radius: 50%;
        width: 225px;
        height: 225px;
        margin-left: 2.5px;
        margin-top: 2.5px;
        border: 0;
        transition: all 0.1s;
        cursor: url("assets/images/pointer_hand.png"), pointer;
        box-shadow:
            0 0 10px 3px #000 inset,
            0 -50px 100px #000000cc inset,
            0 30px 60px #000000cc inset;
    }
    button.engine.active2 {
        background: 
            linear-gradient(
                100deg,
                hsla(0, 50%, 25%, .25) 0%,
                hsla(5, 75%, 35%, .25) 15%,
                hsla(10, 75%, 40%, .25) 25%,
                hsla(15, 75%, 55%, .25) 35%,
                hsla(20, 65%, 45%, .25) 40%,
                hsla(10, 55%, 40%, .25) 50%,
                hsla(5, 55%, 35%, .25) 65%,
                hsla(5, 55%, 35%, .25) 70%,
                hsla(0, 65%, 30%, .25) 85%,
                hsla(0, 75%, 25%, .25) 100%
            ),
            linear-gradient(
                180deg,
                hsla(210, 15%, 20%, .5) 0,
                hsla(220, 25%, 10%, .5) 35%,
                hsla(235, 25%, 5%, .5) 65%,
                hsla(0, 0%, 0%, .5) 100%
            ),
            linear-gradient(
                180deg,
                hsl(200, 80%, 30%) 0%,
                hsl(195, 70%, 45%) 7%,
                hsl(180, 80%, 70%) 25%,
                hsl(180, 100%, 60%) 35%,
                hsl(190, 70%, 55%) 55%,
                hsl(195, 100%, 35%) 75%,
                hsl(200, 85%, 25%) 100%
            );
        background-blend-mode: multiply;
        box-shadow: rgba(3, 102, 214, 0.3) 0px 0px 0px 3px;   
    }
    button.engine:focus {
        outline: none;
    }
    button.engine:active {
        box-shadow:
            0 0 12px 5px #000 inset,
            0 -60px 100px #000000cc inset,
            0 50px 60px #000000cc inset;
        padding-top: 13px;
        background-position-y: 6.5px;
    }
    .light {
        width: 35px;
        height: 15px;
        margin: 0 auto;
        background-color: #212121;
        margin-bottom: 25px;
        border-radius: 7px;
        border: 1px solid #1b1b1b;
        transition: all 0.6s;
    }
    .engine.active .light {
        background-color: #f9ea1a;
        border: 1px solid #923c14;
        box-shadow:
            0 0 11px 3px #c94a29 inset,
            0 0 32px 6px #c77713,
            0 0 100px #fff;
    }
    .engine.active2 .light {
        background-color: #1af9ff;
        border: 1px solid #14923c;
        box-shadow:
            0 0 11px 3px #29c94a inset,
            0 0 32px 6px #13c777,
            0 0 100px #fff;
    }
    button.engine span {
        font-family: sans-serif;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 30px;
        line-height: 1.3;
        color: #212121;
        transition: all 0.6s;
    }
    button.engine.active span {
        color: #ffdea1;
        text-shadow:
            0 0 15px #8ca579,
            0 0 2px #fff;
    }
    button.engine.active2 span {
        color: #a1ffde;
        text-shadow:
            0 0 15px #798ca5,
            0 0 2px #fff;
    }
    button.engine span:first-of-type {
        font-size: 20px;
    }
</style>
<div class="outer-black">
    <div class="outer-iron">
        <div class="glare"></div>
        <div class="inner-black">
            <div class="inner-black-2">
                <div class="inner-black-3">
                    <button class="engine" onclick="letMePlay({})">
                        <div class="light"></div>
                        <span>Right Age?<br /></span>
                        <span>Let me<br />Play<br /></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let letMePlay = (d) => {
        _uz.user.agreed.gambler = !_uz.user.agreed.gambler;
        setTimeout(() => {
            if (_uz.user.agreed.gambler) {
                document.querySelector(".inner-black-3").innerHTML = `
                <button class="engine active"
                    onclick="this.classList.toggle('active2'); localStorage.user = JSON.stringify(_uz.user); setTimeout(() => loadPage({ shells: ['play'], scroll: 0 }), 720)">
                    <div class="light"></div>
                    <span>Confirm?<br /></span>
                    <span>Enter<br /><br /></span>
                </button>`
            }
        }, 1024);
    },
    _uz = { user: localStorage.user ? JSON.parse(localStorage.user) : { agreed: {}, opened: {} } }
    document.querySelector(".engine").addEventListener("click", (event) => {
        event.currentTarget.classList.toggle("active");
    });
</script>
<script src="assets/js/index.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", ()=> {
        window.parent.postMessage({
            id: window.frameElement.id,
            action: "pre-loader",
            show: !1
        }, "*");
    });
</script>
