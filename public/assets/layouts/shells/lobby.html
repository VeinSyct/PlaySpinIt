                        inset: 70% auto auto -5%;

                    }
                }
                & aside {
                    inline-size: 90%;

                    animation: vanish-from-the-board 0.6s ease-out forwards;

                    transform: translateY(-5%);

                    -webkit-transform: translateX(-35%) translateY(0%) rotate(7deg);
                    transform: translateX(-35%) translateY(0%) rotate(7deg);

    .modal-card {
        position: relative;
        z-index: 1;
        width: 100%;
        padding-bottom: 150%;
        perspective: 1000px;
    }
    .modal-card__cover {
        position: absolute;
        z-index: 1;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-image: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        perspective-origin: 50% 50%;
        transform-style: preserve-3d;
        transform-origin: top center;
        will-change: transform;
        transform: skewX(0.001deg);
        transition: transform 0.35s ease-in-out;
        border-radius: calc(3vmin - 4px);
    }
    .modal-card__cover::after {
        display: block;
        content: "";
        position: absolute;
        z-index: 100;
        top: 0;
        left: 0;
        width: 100%;
        height: 120%;
        background: linear-gradient(
            226deg,
            rgba(255, 255, 255, 0.4) 0%,
            rgba(255, 255, 255, 0.4) 35%,
            rgba(255, 255, 255, 0.2) 42%,
            rgba(255, 255, 255, 0) 60%
        );
        transform: translateY(-20%);
        will-change: transform;
        transition: transform 0.65s cubic-bezier(0.18, 0.9, 0.58, 1);
    }
    .modal-card:hover ::after {
        transform: translateY(0%);
    }
    .modal-card::before {
        display: block;
        content: "";
        position: absolute;
        top: 5%;
        left: 5%;
        width: 90%;
        height: 90%;
        background: rgba(0, 0, 0, 0.5);
        box-shadow: 0 6px 12px 12px rgba(0, 0, 0, 0.4);
        will-change: opacity;
        transform-origin: top center;
        transform: skewX(0.001deg);
        transition:
            transform 0.35s ease-in-out,
            opacity 0.5s ease-in-out;
    }
    .modal-card:hover::before {
        opacity: 0.6;
        transform: rotateX(7deg) translateY(-6px) scale(1.05);
    }

    /* ELOAN */
    :root {
        --hue-ecoin: 163;
        --hue-ecoin2: 43;
        font-size: calc(20px + (40 - 20) * (100vw - 280px) / (3840 - 280));
    }
    .eloan {
        position: absolute;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 9.1em;
        top: 47%;
        left: 50%;
        transform: translate(-50%, -50%);
        transform-origin: top left;
    }
    .eloan__coin,
    .eloan__coin-flare,
    .eloan__coin-inscription,
    .eloan__coin-layers,
    .eloan__shadow {
        animation-duration: 2s;
        animation-timing-function: cubic-bezier(0.37, 0, 0.63, 1);
        animation-iteration-count: infinite;
    }
    .eloan__coin {
        animation-name: ecoin-bounce;
        position: relative;
        transform: translateY(0.5em);
        z-index: 1;
    }
    .eloan__coin-flare,
    .eloan__coin-inscription,
    .eloan__coin-layer {
        position: absolute;
    }
    .eloan__coin-flare {
        animation-name: ecoin-flare1;
        background-color: white;
        clip-path: polygon(50% 0, 67% 33%, 100% 50%, 67% 67%, 50% 100%, 33% 67%, 0 50%, 33% 33%);
        top: 0;
        left: -0.5em;
        width: 1em;
        height: 1em;
        transform: scale(0);
        z-index: 1;
    }
    .eloan__coin-flare:nth-child(2) {
        animation-name: ecoin-flare2;
        top: -0.5em;
        left: 0;
    }
    .eloan__coin-flare:nth-child(3) {
        animation-name: ecoin-flare3;
        left: 3em;
    }
    .eloan__coin-flare:nth-child(4) {
        animation-name: ecoin-flare4;
        top: -0.5em;
        left: 3.5em;
    }
    .eloan__coin-inscription {
        animation-name: inscription-front;
        background-color: hsl(var(--hue-ecoin2), 90%, 45%);
        box-shadow: 0.1875em 0 0 hsl(var(--hue-ecoin2), 90%, 40%) inset;
        top: 50%;
        left: 50%;
        width: 0.5em;
        height: 2.5em;
        transform: translate(-50%, -50%) rotateZ(30deg);
    }
    .eloan__coin-layer {
        background-color: hsl(var(--hue-ecoin2), 90%, 50%);
        backface-visibility: hidden;
        border-radius: 50%;
        box-shadow: 0 0 0 0.375em hsl(var(--hue-ecoin2), 90%, 70%) inset;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .eloan__coin-layer:first-child {
        transform: translate3d(0, 0, 0.5em);
    }
    .eloan__coin-layer:nth-child(2) {
        transform: translate3d(0, 0, 0.49em) rotateY(180deg);
    }
    .eloan__coin-layer:nth-child(3) {
        backface-visibility: visible;
        border-radius: 0;
        left: 50%;
        width: 0.98em;
        transform: translateX(-50%) rotateY(90deg);
    }
    .eloan__coin-layer:nth-child(4) {
        transform: translate3d(0, 0, -0.49em);
    }
    .eloan__coin-layer:last-child {
        transform: translate3d(0, 0, -0.5em) rotateY(180deg);
    }
    .eloan__coin-layer:nth-child(n + 2):nth-last-child(n + 2) {
        background-color: hsl(var(--hue-ecoin2), 90%, 40%);
        box-shadow: none;
    }
    .eloan__coin-layer:last-child .eloan__coin-inscription {
        animation-name: inscription-back;
        transform: translate(-50%, -50%) rotateZ(-30deg);
    }
    .eloan__coin-layers {
        animation-name: ecoin-roll;
        position: relative;
        width: 4em;
        height: 4em;
        transform: rotateY(-15deg) rotateZ(-30deg);
        transform-style: preserve-3d;
    }
    .eloan__shadow {
        animation-name: ecoin-shadow;
        background-color: hsla(var(--hue-ecoin), 90%, 10%, 0.3);
        border-radius: 50%;
        width: 4em;
        height: 0.5em;
    }
    @keyframes ecoin-bounce {
        from,
        50%,
        to {
            animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0);
            transform: translateY(0.5em);
        }
        25%,
        75% {
            animation-timing-function: cubic-bezier(0.33, 1, 0.67, 1);
            transform: translateY(5.1em);
        }
    }
    @keyframes ecoin-flare1 {
        from,
        75%,
        to {
            animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0);
            transform: scale(0);
        }
        87.5% {
            animation-timing-function: cubic-bezier(0.33, 1, 0.67, 1);
            transform: scale(1);
        }
    }
    @keyframes ecoin-flare2 {
        from,
        to {
            animation-timing-function: cubic-bezier(0.33, 1, 0.67, 1);
            transform: scale(1);
        }
        12.5%,
        87.5% {
            animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0);
            transform: scale(0);
        }
    }
    @keyframes ecoin-flare3 {
        from,
        25%,
        50%,
        to {
            animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0);
            transform: scale(0);
        }
        37.5% {
            animation-timing-function: cubic-bezier(0.33, 1, 0.67, 1);
            transform: scale(1);
        }
    }
    @keyframes ecoin-flare4 {
        from,
        37.5%,
        62.5%,
        to {
            animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0);
            transform: scale(0);
        }
        50% {
            animation-timing-function: cubic-bezier(0.33, 1, 0.67, 1);
            transform: scale(1);
        }
    }
    @keyframes inscription-front {
        from,
        75% {
            animation-timing-function: cubic-bezier(0.12, 0, 0.39, 0);
            box-shadow: 0.1875em 0 0 hsl(var(--hue-ecoin2), 90%, 40%) inset;
        }
        87.49% {
            animation-timing-function: steps(1);
            box-shadow: 0.875em -0.75em 0 hsl(var(--hue-ecoin2), 90%, 40%) inset;
        }
        87.5% {
            animation-timing-function: cubic-bezier(0.61, 1, 0.88, 1);

    @keyframes ecoin-roll {
        from,

            transform: rotateY(-15deg) rotateZ(-30deg) rotateY(0);
        }

            transform: rotateY(-15deg) rotateZ(-30deg) rotateY(-1turn);

    @keyframes ecoin-shadow {

        50%,
        to {
            animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0);

<script>
    let _uz = {
        user: localStorage.user ? JSON.parse(localStorage.user) : { agreed: {}, opened: {} },
        grant: {
			0: { amount: "100", left: "-42px" },
			1: { amount: "1,500", left: "-60px" },
			2: { amount: "2,500", left: "-60px" },
			3: { amount: "4,500", left: "-60px" },
            4: { amount: "", left: "0px" }
		},
        curtain: document.querySelector(".hand__curtain"),
        cardSet: [],
        cards: document.getElementsByClassName("card-frame"),
        clones: document.getElementsByClassName("card-frame-clone"),
        handleCardClick: (card, clone, event) => {
            card.classList.add("card--hidden");
            event.stopPropagation();
            _uz.curtain.classList.add("curtain--visible");
            clone.classList.add("card--visible");
        },
        joinClub: (d) => {
            loadPage({ shells: [d.in ? 'welcome' : 'signup'], scroll: 0, reset: !0 });
        },
        loanRequest: (d) => {
            if (_uz.user.granted && _uz.user.granted > 3 || d.out || localStorage["credit-loan"]) {
                localStorage.dialog = JSON.stringify({
                    message: 
                        localStorage["credit-loan"] ? [
                            `The next loan will be available once you’ve used your current <strong>loan</strong>. Go play first!`,
                            `Hold on! You need to use your current <strong>loan</strong> before requesting another.`,
                            `Play first! The next <strong>loan</strong> unlocks after you’ve used the one you already have.`,
                            `You still have an active <strong>loan</strong>! Use it before taking another one.`,
                            `Almost there! Consume your current <strong>loan</strong> in the game to unlock the next one.`
                            ][Math.floor(Math.random() * 5)] :
                        _uz.user.granted > 3 ? [
                            `There is no loan available at the moment, you may bring your request to <strong>Play Spin It!</strong> games or to the authorized establishment(s) for another or additional <strong>$ ${_uz.grant[_uz.user.granted || 0].amount}</strong> eℂash grants.`,
                            `Currently, no loan is available; you can submit your request at <strong>Play Spin It!</strong> games or through authorized establishment(s) for additional <strong>$ ${_uz.grant[_uz.user.granted || 0].amount}</strong> eℂash grants.`,
                            `No loan is available right now, but you may take your request to <strong>Play Spin It!</strong> games or authorized establishment(s) to receive another <strong>$ ${_uz.grant[_uz.user.granted || 0].amount}</strong> eℂash grant.`,
                            `Loans are unavailable at the moment; please bring your request to <strong>Play Spin It!</strong> games or authorized establishment(s) to obtain an additional <strong>$ ${_uz.grant[_uz.user.granted || 0].amount}</strong> eℂash grant.`,
                            `We currently have no loans available. You may submit your request at <strong>Play Spin It!</strong> games or to authorized establishment(s) for another <strong>$ ${_uz.grant[_uz.user.granted || 0].amount}</strong> eℂash grant.`
                            ][Math.floor(Math.random() * 5)] : [
                            `You’re not a member yet. Select the first card to <strong>join</strong> the <strong>Lucky</strong> club!`,
                            `Not a member? No worries! Pick the first card to <strong>join</strong> the exclusive <strong>Lucky</strong> club.`,
                            `Become part of the club! Select the first card to <strong>join</strong> the <strong>Lucky</strong> club.`,
                            `You haven’t joined yet! Choose the first card to <strong>join</strong> the prestigious <strong>Lucky</strong> club.`,
                            `Membership unlocks benefits! Select the first card to <strong>join</strong> the <strong>Lucky</strong> club.`
                        ][Math.floor(Math.random() * 5)],
                    buttons: {
                        dismiss: {
                            text: `<span><i class="fa fa-check" style="margin-right: 12px"></i> Dismiss</span>`,
                            shells: `['carousel', 'lobby', 'faqs']`,
                            scroll: 1,
                            reset: !0
                        }
                    },
                    back: {
                        shells: `['carousel', 'lobby', 'faqs']`,
                        scroll: 1,
                        reset: !0
                    }
                });
                d.j = !0;
            };
            loadPage({ shells: [d.j ? 'dialog' : 'grant'], scroll: 0, reset: !0 });
        },
        playSpin: (d) => {
            localStorage.url = `${"https://slotreel.web.app"}`;
            loadPage({ shells: ['play'], scroll: 0, reset: !0 });
        }
    };
    for (let i in _uz.cards)
        if (_uz.cards[i].style)
            _uz.cardSet.push({
                    card: _uz.cards[i],
                    clone: _uz.clones[i],
                });
    _uz.dom = { grant: document.querySelectorAll(".grant") };
    for (let i in _uz.dom.grant)
        if (_uz.dom.grant[i].style) {
            _uz.dom.grant[i].innerHTML = !_uz.user.granted || _uz.user.granted < 4 ? `<span class="metallic-text gold-text grant" data-gold="$ ${_uz.grant[_uz.user.granted || 0].amount}.">$ ${_uz.grant[_uz.user.granted || 0].amount}.</span><span class="metallic-text silver-text" data-silver="00">00</span>` : "";
            _uz.dom.grant[i].style.left = _uz.grant[_uz.user.granted || 0].left;
        }
    _uz.cardSet.forEach(({ card, clone }) => {
        card.addEventListener("click", (event) => _uz.handleCardClick(card, clone, event));
    });
    _uz.cardSet.forEach(({ card }) => {
        card.addEventListener("mouseover", () =>
            card.classList.add("card--touched")
        );
        card.addEventListener("touchstart", () =>
            card.classList.add("card--touched")
        );
        card.addEventListener("touchend", () =>
            card.classList.remove("card--touched")
        );
    });
    closeCard = (d) => {
        _uz.cardSet.forEach(({ clone }) => {
            clone.classList.remove("card--visible");
        });
        _uz.curtain.classList.remove("curtain--visible");
        _uz.cardSet.forEach(({ card }) => {
            card.classList.remove("card--hidden");
        });
    };
</script>
