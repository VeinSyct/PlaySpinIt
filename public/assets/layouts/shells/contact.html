<meta name="viewport" content="width = device-width, initial-scale = 1, minimum-scale = 1, maximum-scale = 1, user-scalable = 0, viewport-fit = cover, shrink-to-fit = no">
<link rel="stylesheet" href="assets/css/font-awesome.min.css" />
<link rel="stylesheet" href="assets/css/style.css" />
<link rel="stylesheet" href="assets/css/metallicgold.css" />
<style>
    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
		overflow-y: scroll;
        color: white;
	}
    .content-section {
        margin: 64px 0 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
    }
    .section-title {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff, #f0f0f0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .section-subtitle {
        font-size: 1.1rem;
        opacity: .8;
        max-width: 600px;
        line-height: 1.6;
    }
    .section {
        padding: 5rem 1rem;
    }
    .section h2 {
        text-align: center;
        margin-bottom: 3rem;
        font-size: 2.5rem;
        color: white;
    }
    section {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: hidden;
        animation: fadeIn 1000ms ease;
        -webkit-animation: fadeIn 1000ms ease;
	}
	@keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    @-webkit-keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    .contact-form {
        margin: 0 auto 24px;
        padding: 40px 40px 12px;
        max-width: 600px;
        color: white;
        border-radius: 25px;
    }
    @media only screen and (max-width:480px) {
        section {
            margin: 0 12px 24px;
        }
        .contact-form {
            margin: 0 20px 24px;
            padding: 30px 25px;
            width: 96%;
        }
    }
    @media only screen and (min-width:481px) and (max-width:768px) {
        section {
            margin: 0 42px 24px;
        }
        .contact-form {
            margin: 0 10px 24px;
            padding: 25px 20px;
        }
    }
    .content {
        position: absolute;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        overflow: hidden;
    }
    .content-youtube {
        width: 100%;
        height: 100%;
        position: absolute;
        width: calc((100% * 16) / 9);
        transform: scale(1.5);
        pointer-events: none;
        mix-blend-mode: luminosity;
        opacity: .09;
    }
    @media only screen and (max-width:480px) {
        .content-youtube {
            width: calc((100% * 16) / 9);
            transform: scale(3.8);
        }
    }
    @media only screen and (min-width:481px) and (max-width:768px) {
        .content-youtube {
            width: calc((100% * 16) / 9);
            transform: scale(1.5);
        }
    }
    .info {
        padding: 0 36px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .info h3 {
        filter: drop-shadow(0 0 2px black);
    }
    .info p {
        margin-bottom: 20px;
        color: #fff;
        font-weight: 500;
        font-size: 1rem;
        line-height: 1.5;
    }
    .form-group {
        margin-bottom: 24px;
        position: relative;
    }
    .form-label {
        margin-bottom: 8px;
        display: block;
        color: rgba(255, 255, 255, .9);
        font-weight: 500;
        font-size: .95rem;
    }
    .form-input,
    .form-textarea {
        padding: 15px 20px;
        width: 100%;
        background: rgba(255, 255, 255, .1);
        border: 1px solid rgba(255, 255, 255, .2);
        border-radius: 15px;
        color: white;
        font-size: 16px;
        outline: none;
        transition: all .3s ease;
        backdrop-filter: blur(10px);
        box-sizing: border-box;
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
        color: rgba(255, 255, 255, .6);
    }
    .form-input:focus,
    .form-textarea:focus {
        border-color: rgba(255, 255, 255, .4);
        background: rgba(255, 255, 255, .15);
        box-shadow: 0 0 20px rgba(255, 255, 255, .1);
        transform: translateY(-2px);
    }
    .form-textarea {
        resize: vertical;
        min-height: 120px;
        font-family: inherit;
    }
    .metallic-button {
        display: flex;
        justify-content: center;
        width: 100%;
    }
    .metallic-button > button {
        position: relative;
        padding: 12px 42px;
        font-size: 1.1rem;
        color: rgba(120, 140, 200, 1);
        background: 
            linear-gradient(
                90deg,
                hsla(230, 35%, 15%, .5) 0%,
                hsla(245, 30%, 40%, .5) 15%,
                hsla(230, 55%, 45%, .5) 40%,
                hsla(225, 20%, 30%, .5) 60%,
                hsla(235, 25%, 25%, .5) 80%,
                hsla(225, 50%, 16%, .5) 100%
            ),
            linear-gradient(45deg, Black 0, #333333 20%, #666666 40%, #4d4d4d 70%, #000000 100%);
        border-radius: 12px;
        border: 4px solid #575757;
        border: .5px solid #fadc88;
        border-top: .031em solid #fadc88;
        border-left: .031em solid #9c7625;
        border-right: .031em solid #9c7625;
        border-bottom: .031em solid #9c7625;
        backdrop-filter: blur(3px) saturate(160%);
        -webkit-backdrop-filter: blur(12px) saturate(160%);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.35s ease;
    }
    .metallic-button > button::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
        opacity: 0;
        transition: opacity 0.4s ease;
    }
    .metallic-button > button:hover {
        color: #a0c6ff;
        transform: translateY(-2px) scale(1.03);
        backdrop-filter: blur(6px) saturate(160%);
    }
    .metallic-button > button:hover::before {
        opacity: 1;
        animation: metal-shine 1s ease-out forwards;
    }
    .metallic-button > button:active {
        color: rgba(200, 240, 255, 1);
        background:
            linear-gradient(
                135deg,
                rgba(0, 0, 0, .25) 0,
                rgba(26, 26, 26, .25) 15%,
                rgba(77, 77, 77, .25) 25%,
                rgba(129, 54, 54, .25) 50%,
                rgba(26, 26, 26, .25) 75%,
                rgba(0, 0, 0, .25) 100%
            ),
            radial-gradient(circle farthest-corner at 50% 50%, transparent 45%, rgba(0, 0, 0, .5) 100%),
            linear-gradient(
                90deg,
                hsla(230, 35%, 15%, .5) 0%,
                hsla(245, 30%, 40%, .5) 15%,
                hsla(230, 55%, 45%, .5) 40%,
                hsla(225, 20%, 30%, .5) 60%,
                hsla(235, 25%, 25%, .5) 80%,
                hsla(225, 50%, 16%, .5) 100%
            ),
            linear-gradient(45deg, Black 0, #333333 20%, #666666 40%, #4d4d4d 70%, #000000 100%);
        box-shadow: rgba(0, 0, 0, 0.25) 0px 0.0625em 0.0625em, rgba(0, 0, 0, 0.25) 0px 0.125em 0.5em, rgba(255, 255, 255, 0.1) 0px 0px 0px 1px inset;
        transform: translateY(0) scale(1);
    }
    @keyframes metal-shine {
        0% {
            transform: translate(-50%, -50%) rotate(0deg);
            opacity: 0.3;
        }
        100% {
            transform: translate(150%, 150%) rotate(360deg);
            opacity: 0;
        }
    }
    .modal-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        text-decoration: none;
        color: #666;
        box-shadow: inset 0 0 0 1px #c9c9c9, inset 0 1px 2px rgba(255, 255, 255, 0.5), inset 0 -1px 2px rgba(0, 0, 0, 0.5);
        background: conic-gradient(#d7d7d7, #c3c3c3, #cccccc, #c6c6c6, #d3d3d3, #d8d8d8, #d5d5d5, #d8d8d8, #d3d3d3, #c5c5c5, #c0c0c0, #bfbfbf, #d0d0d0, #d9d9d9, #d1d1d1, #c5c5c5, #c8c8c8, #d7d7d7, #d5d5d5, #cdcdcd, #c4c4c4, #d9d9d9, #cecece, #c5c5c5, #c5c5c5, #cdcdcd, #d8d8d8, #d9d9d9, #d7d7d7) content-box, linear-gradient(#d4d4d4, #d4d4d4) padding-box, radial-gradient(rgba(120, 120, 120, 0.9), rgba(120, 120, 120, 0) 70%) 50% bottom/80% 0.46875em no-repeat border-box;
        text-shadow: 0 0 1px currentColor, 0 0 2px dimgrey;
        backdrop-filter: blur(7px);
        border-radius: 50%;
        border-top: .031em solid #fadc88;
        border-left: .031em solid #9c7625;
        border-right: .031em solid #9c7625;
        border-bottom: .031em solid #9c7625;
        fill: currentColor;
        cursor: url("assets/images/pointer_hand.png"), pointer;
        transition: all .3s ease;
    }
    .modal-icon:hover {
        box-shadow: 0 8px 20px rgba(0, 0, 0, .15) inset;
    }
    .modal-icon:active {
        box-shadow: rgba(9, 30, 66, .25) 0px 1px 1px, rgba(9, 30, 66, .13) 0px 0px 1px 1px  inset;
    }
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    @media only screen and (max-width:480px) {
        .form-row {
            grid-template-columns: 1fr;
            gap: 15px;
        }
    }
</style>
<section>
    <section class="content-section">
        <h1 class="section-title">
            <span class="metallic-text gold-text" data-gold="Contact">Contact</span>
        </h1>
    </section>
    <div class="contact-form modal-frame">
        <div class="content">
            <iframe class="content-youtube" src="https://www.youtube.com/embed/72giVpo8Yq4?autoplay=1&autohide=0&mute=1&disablekb=1&loop=1&rel=0&playlist=72giVpo8Yq4" allow="autoplay; encrypted-media" frameborder="0" scrolling="no" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>
        </div>
        <div class="info">
            <h3><i class='fa fa-envelope-o fa-2x'></i></h3>
            <p>Contact form 24/7 to ensure your experience is smooth, secure, and enjoyable.</p>
        </div>
        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-input" placeholder="Enter your name"/>            
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="Enter your email address"/>
            </div>
            <div class="form-group">
                <label class="form-label">WhatsApp</label>
                <input type="text" class="form-input" placeholder="Enter your number"/>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Message</label>
            <textarea class="form-textarea" placeholder="Tell us more about your concerns..."></textarea>
        </div>
        <div class="metallic-button">
            <button class="submit-btn" onclick="submitMessage({ m: {}, cu: {} })">
                <span>Send Message</span>
            </button>
        </div>
        <br>
        <br>
        <div class="info">
            <div class="form-group">
                <span class="modal-icon" onclick="window.open('https://web.facebook.com/groups/playspin')">
                    <i class="fa fa-facebook" style="font-size: 24px;"></i>
                </span>
            </div>
            <p>
                <i class="fa fa-map-marker"></i>
                <span class="metallic-text gold-text" data-gold="Amwaj Rotana,">Amwaj Rotana,</span>
                <span class="metallic-text silver-text" data-silver="The Walk, JBR, Dubai, UAE.">The Walk, JBR, Dubai, UAE.</span>
            </p>
        </div>
    </div>
    <br>
</section>
<script>
    let getDigit = (d) => {
        return d.s.match(/\d+/g).toString().replace(/,/g, "");
    },
    sendWhatsApp = (d) => {
        if (/Tablet|iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
            d.w = "https://wa.me/";
        else d.w = "https://web.whatsapp.com/send/?phone=";
        return `${d.w}${getDigit({ s: d.m })}`;
    },
    submitMessage = (d) => {
        for (let i = 0, j = ["form-input", "form-textarea"]; i < j.length; i++) {
            d.e = document.getElementsByClassName(j[i]);
            for (let k in d.e)
                d.cu[`${j[i]}-${k}`] = d.e[k].value;
            for (let k in d.e)
                if (d.e[k].value !== undefined) {
                    if (d.e[k].value !== undefined) {
                        d.v = d.e[k].value.trim();
                        if ((k == 0 && d.v.length < 3) || (k == 1 && !(/^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9-]+(?:\.[a-zA-Z0-9-]+)*$/.test(d.v))) || (k == 2 && !d.v.match(/^[\d,\s,\+,\-]{5,20}/))) {
                            d.x = k;
                            continue;
                        }
                        d.m[`${j[i]}-${k}`] = d.v;
                    }
                }
        };
        localStorage.contactus = JSON.stringify(d.cu);
        if (!d.x) {
            if (navigator.onLine) {
                window.parent.postMessage({
                    action: "contact-us",
                    message: d.m
                }, "*");
                d.m = `Your message <i class='fa fa-envelope-o'></i> has been sent, we will get back to you soon.`;
                delete localStorage.contactus;
            } else d.m = `Unable to send message, because you are not connected <i class='fa fa-chain-broken'></i> to the internet!`;
        } else d.m = d.x == 1 ? `Unable to send message with invalid email.` : d.x == 2 ? `Unable to send message with invalid mobile.` : `Please complete the form and submit message again.`;
        localStorage.dialog = JSON.stringify({
                message: d.m,
                buttons: {
                    dismiss: {
                        text: `<span>Dismiss</span>`,
                        shells: `['contact']`,
                        scroll: 0
                    }
                },
                back: {
                    shells: `['contact']`,
                    scroll: 0
                }
            });
        loadPage({ shells: ['dialog'], scroll: 0 });
    },
    _uz = {};
    if (localStorage.contactus) {
        _uz.cu = JSON.parse(localStorage.contactus);
        for (let i = 0, j = ["form-input", "form-textarea"]; i < j.length; i++) {
            _uz.e = document.getElementsByClassName(j[i]);
            for (let k in _uz.e)
                _uz.e[k].value = _uz.cu[`${j[i]}-${k}`];
        }
    };
</script>
<script src="assets/js/index.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", ()=> {
        window.parent.postMessage({
            id: window.frameElement.id,
            action: "pre-loader",
            show: !1
        }, "*");
    });
</script>
